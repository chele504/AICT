model:
  text_model_name: "bert-base-chinese"
  image_model_name: "resnet18"
  audio_backbone_type: "wav2vec2"
  audio_model_name: "facebook/wav2vec2-base-960h"
  text_hidden_size: 768
  fusion_hidden_size: 256
  num_attention_heads: 4
  fusion_layers: 2
  fusion_ffn_size: 512
  use_modality_gating: true
  dropout: 0.1
  allow_online_model_download: true
  audio_sample_rate: 16000
  audio_duration_seconds: 2.0
  audio_n_fft: 400
  audio_hop_length: 160

train:
  batch_size: 4
  epochs: 3
  learning_rate: 0.0002
  weight_decay: 0.0001
  max_grad_norm: 1.0
  val_ratio: 0.2
  random_seed: 42
  target_column: "target_score"
  image_column: "image_path"
  audio_column: "audio_path"
  text_column: "review_text"
  output_dir: "outputs"
  indicator_weight_alpha: 0.5
  auto_indicator_weight_alpha: true
  denoise_enabled: false
  denoise_method: "kalman"
  kalman_process_variance: 0.0001
  kalman_measurement_variance: 0.01
  ema_alpha: 0.25
  ema_min_alpha: 0.05
  ema_max_alpha: 0.6
  ema_window: 5
  dataloader_num_workers: 0
  dataloader_pin_memory: true
  dataloader_persistent_workers: true
  dataloader_prefetch_factor: 2
  cache_preprocessed_inputs: true
  mixed_precision: true
  early_stopping_patience: 3
  early_stopping_min_delta: 0.0
  freeze_text_encoder: false
  freeze_image_encoder: false
  freeze_audio_encoder: false

explain:
  background_size: 32
  sample_size: 16

report:
  enabled: true
  top_k_features: 12
  write_markdown: true
  attention_summary_max_batches: 8
